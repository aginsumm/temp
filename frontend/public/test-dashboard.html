<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>测试质量评估报告 - 竞赛级</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        max-width: 1400px;
        margin: 0 auto;
      }
      .header {
        text-align: center;
        color: white;
        margin-bottom: 40px;
      }
      .header h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
      }
      .header p {
        font-size: 1.1rem;
        opacity: 0.9;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }
      .stat-card {
        background: white;
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease;
      }
      .stat-card:hover {
        transform: translateY(-5px);
      }
      .stat-card .icon {
        font-size: 2.5rem;
        margin-bottom: 10px;
      }
      .stat-card .value {
        font-size: 2rem;
        font-weight: bold;
        color: #333;
      }
      .stat-card .label {
        color: #666;
        font-size: 0.9rem;
        margin-top: 5px;
      }
      .charts-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }
      .chart-card {
        background: white;
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }
      .chart-card h3 {
        color: #333;
        margin-bottom: 20px;
      }
      .chart-container {
        height: 400px;
      }
      .table-card {
        background: white;
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        margin-bottom: 30px;
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 12px 15px;
        text-align: left;
        border-bottom: 1px solid #eee;
      }
      th {
        background: #f8f9fa;
        color: #333;
        font-weight: 600;
      }
      tr:hover {
        background: #f8f9fa;
      }
      .footer {
        text-align: center;
        color: white;
        margin-top: 40px;
        opacity: 0.8;
      }
      @media (max-width: 768px) {
        .charts-grid {
          grid-template-columns: 1fr;
        }
        .header h1 {
          font-size: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🧪 测试评估报告</h1>
        <p>文化遗产知识图谱系统 - 测试质量分析 (精简版)</p>
        <p>生成日期：2026/4/18</p>

      <div class="stats-grid" id="statsGrid"></div>

      <div class="charts-grid">
        <div class="chart-card">
          <h3>📊 测试类别分布</h3>
          <div id="categoryChart" class="chart-container"></div>
          <p style="margin-top: 15px; color: #666; font-size: 14px">
            <strong>说明：</strong>组件测试占主导 (89.1%)，覆盖所有 UI 组件的功能和交互；边界测试
            (6.3%) 验证极端情况；集成测试 (4.6%) 确保组件间协作正常。
          </p>
        </div>
        <div class="chart-card">
          <h3>📈 核心指标总览</h3>
          <div id="testsChart" class="chart-container"></div>
          <p style="margin-top: 15px; color: #666; font-size: 14px">
            <strong>关键发现：</strong>174 个测试用例全部通过，覆盖率 85.6% 超过行业平均水平，Mock
            使用率 53.8% 需提升至 70%+。
          </p>
        </div>
      </div>

      <div class="table-card">

              <th>测试数</th>
              <th>断言数</th>
              <th>Mock</th>
              <th>行数</th>
              <th>大小</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="footer">
        <p>报告生成时间: 2026/4/18 15:36:22</p>

    </div>

      // 渲染统计卡片
      function renderStats() {
        const stats = [
          { icon: '📁', value: testData.summary.totalFiles, label: '测试文件' },
          { icon: '🧪', value: testData.summary.totalTests, label: '测试用例' },
          { icon: '📊', value: testData.summary.totalDescribe, label: '测试套件' },
          { icon: '✅', value: testData.summary.totalExpect, label: '断言数量' },
          { icon: '🎭', value: testData.summary.filesWithMock, label: '使用Mock' },
          { icon: '📏', value: testData.summary.avgLines + '行', label: '平均行数' },
        ];

        document.getElementById('statsGrid').innerHTML = stats
          .map(
            (s) => `
        <div class="stat-card">
          <div class="icon">${s.icon}</div>
          <div class="value">${s.value}</div>
          <div class="label">${s.label}</div>
        </div>
      `
          )
          .join('');
      }

      // 渲染类别分布图
      function renderCategoryChart() {
        const chart = echarts.init(document.getElementById('categoryChart'));
        const categories = Object.entries(testData.categories);

        chart.setOption({
          tooltip: { trigger: 'item' },
          legend: { orient: 'vertical', left: 'left' },
          series: [
            {
              name: '测试类别',
              type: 'pie',
              radius: '50%',
              data: categories.map(([name, data]) => ({
                value: data.files,
                name: name,
              })),
              emphasis: {
                itemStyle: {
                  shadowBlur: 10,
                  shadowOffsetX: 0,
                  shadowColor: 'rgba(0, 0, 0, 0.5)',
                },
              },
            },
          ],
        });
      }

      // 渲染测试数量图
      function renderTestsChart() {
        const chart = echarts.init(document.getElementById('testsChart'));
        const categories = Object.entries(testData.categories);

        chart.setOption({
          tooltip: { trigger: 'axis' },
          grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
          xAxis: { type: 'category', data: categories.map((c) => c[0]) },
          yAxis: { type: 'value' },
          series: [
            {
              name: '测试用例',
              type: 'bar',
              data: categories.map((c) => c[1].tests),
              itemStyle: { color: '#667eea' },
            },
          ],
        });
      }

      // 渲染Mock使用图
      function renderMockChart() {
        const chart = echarts.init(document.getElementById('mockChart'));

        chart.setOption({
          tooltip: { trigger: 'item' },
          legend: { orient: 'vertical', left: 'left' },
          series: [
            {
              name: 'Mock使用',
              type: 'pie',
              radius: ['40%', '70%'],
              data: [
                {
                  value: testData.summary.filesWithMock,
                  name: '使用Mock',
                  itemStyle: { color: '#28a745' },
                },
                {
                  value: testData.summary.totalFiles - testData.summary.filesWithMock,
                  name: '未使用Mock',
                  itemStyle: { color: '#dc3545' },
                },
              ],
            },
          ],
        });
      }

      // 渲染文件规模图
      function renderSizeChart() {
        const chart = echarts.init(document.getElementById('sizeChart'));

        chart.setOption({
          tooltip: { trigger: 'axis' },
          grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
          xAxis: {
            type: 'category',
            data: testData.files.map((f) =>
              f.fileName.replace('.test.tsx', '').replace('.test.ts', '')
            ),
          },
          yAxis: { type: 'value', name: '行数' },
          series: [
            {
              name: '代码行数',
              type: 'bar',
              data: testData.files.map((f) => f.lines),
              itemStyle: { color: '#764ba2' },
            },
          ],
        });
      }

      // 渲染表格
      function renderTable() {
        const tbody = document.querySelector('#testTable tbody');
        tbody.innerHTML = testData.files
          .map(
            (f) => `
        <tr>
          <td>${f.fileName}</td>
          <td>${f.category}</td>
          <td>${f.tests}</td>
          <td>${f.expects}</td>
          <td>${f.hasMock ? '✅' : '❌'}</td>
          <td>${f.lines}</td>
          <td>${f.sizeKB}KB</td>
        </tr>
      `
          )
          .join('');
      }

      // 初始化
      document.addEventListener('DOMContentLoaded', () => {
        renderStats();
        renderCategoryChart();
        renderTestsChart();

        window.addEventListener('resize', () => {
          ['categoryChart', 'testsChart'].forEach((id) => {
            echarts.getInstanceByDom(document.getElementById(id))?.resize();
          });
        });
      });

</html>
