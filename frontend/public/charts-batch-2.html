<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>测试可视化图表 - 第 2 批：配置与分布</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --bg-primary: #0a0e27;
        --bg-secondary: #151937;
        --bg-card: #1a1f3a;
        --border-color: #2d3555;
        --text-primary: #e4e6f0;
        --text-secondary: #8b8fa8;
        --accent-blue: #3b82f6;
        --accent-green: #10b981;
        --accent-red: #ef4444;
        --accent-yellow: #f59e0b;
        --accent-purple: #8b5cf6;
        --accent-cyan: #06b6d4;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          'Segoe UI',
          'SF Pro Display',
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        padding: 32px;
      }

      .container {
        max-width: 1600px;
        margin: 0 auto;
      }

      .header {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: 32px 40px;
        margin-bottom: 32px;
      }

      .header h1 {
        font-size: 28px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .header p {
        color: var(--text-secondary);
        font-size: 14px;
      }

      .section {
        margin-bottom: 40px;
      }

      .section-title {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .section-title i {
        color: var(--accent-blue);
      }

      .charts-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 24px;
      }

      .chart-card {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        overflow: hidden;
      }

      .chart-header {
        padding: 20px 24px;
        border-bottom: 1px solid var(--border-color);
      }

      .chart-title {
        font-size: 15px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .chart-title i {
        color: var(--accent-blue);
      }

      .chart-body {
        padding: 24px;
      }

      .chart-container {
        height: 400px;
      }

      @media (max-width: 1200px) {
        .charts-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1><i class="fas fa-cogs"></i> 测试可视化图表 - 第 2 批</h1>
        <p>测试配置与分布 • 组件类型分析</p>
      </header>

      <!-- 测试配置与分布 -->
      <div class="section">
        <h2 class="section-title">
          <i class="fas fa-project-diagram"></i>
          测试配置流程图
        </h2>
        <div class="charts-grid">
          <!-- 图表 5: 测试配置流程图 -->
          <div class="chart-card">
            <div class="chart-header">
              <h3 class="chart-title">
                <i class="fas fa-project-diagram"></i>
                测试配置流程图
              </h3>
            </div>
            <div class="chart-body">
              <div class="chart-container" id="configFlowChart"></div>
            </div>
          </div>

          <!-- 图表 6: 组件类型分布柱状图 -->
          <div class="chart-card">
            <div class="chart-header">
              <h3 class="chart-title">
                <i class="fas fa-chart-bar"></i>
                组件类型分布柱状图
              </h3>
            </div>
            <div class="chart-body">
              <div class="chart-container" id="componentTypeBarChart"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- 状态与工具函数 -->
      <div class="section">
        <h2 class="section-title">
          <i class="fas fa-sync-alt"></i>
          状态流转与工具函数
        </h2>
        <div class="charts-grid">
          <!-- 图表 7: Store 状态流转图 -->
          <div class="chart-card">
            <div class="chart-header">
              <h3 class="chart-title">
                <i class="fas fa-exchange-alt"></i>
                Store 状态流转图
              </h3>
            </div>
            <div class="chart-body">
              <div class="chart-container" id="storeFlowChart"></div>
            </div>
          </div>

          <!-- 图表 8: 工具函数输入输出映射图 -->
          <div class="chart-card">
            <div class="chart-header">
              <h3 class="chart-title">
                <i class="fas fa-random"></i>
                工具函数输入输出映射图
              </h3>
            </div>
            <div class="chart-body">
              <div class="chart-container" id="utilSankeyChart"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const testData = {
        categories: {
          组件测试: { tests: 155 },
          边界测试: { tests: 66 },
          集成测试: { tests: 19 },
          状态管理: { tests: 11 },
          工具函数: { tests: 8 },
        },
      };

      const colors = {
        blue: '#3b82f6',
        green: '#10b981',
        red: '#ef4444',
        yellow: '#f59e0b',
        purple: '#8b5cf6',
        cyan: '#06b6d4',
      };

      const commonTooltip = {
        trigger: 'item',
        backgroundColor: 'rgba(26, 31, 58, 0.95)',
        borderColor: '#2d3555',
        borderWidth: 1,
        textStyle: { color: '#e4e6f0', fontSize: 13 },
        padding: [12, 16],
        extraCssText: 'border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.3);',
      };

      const commonAxisLabel = {
        color: '#8b8fa8',
        fontSize: 11,
      };

      function createChart(elementId, option) {
        const chart = echarts.init(document.getElementById(elementId));
        chart.setOption(option);
        return chart;
      }

      document.addEventListener('DOMContentLoaded', function () {
        // 图表 5: 测试配置流程图
        const configData = {
          nodes: [
            { name: 'vitest.config.ts' },
            { name: 'globals: true' },
            { name: 'environment: jsdom' },
            { name: 'setupFiles' },
            { name: 'pool: vmThreads' },
            { name: 'coverage' },
          ],
          links: [
            { source: 0, target: 1 },
            { source: 0, target: 2 },
            { source: 0, target: 3 },
            { source: 0, target: 4 },
            { source: 0, target: 5 },
          ],
        };

        const configFlowChart = createChart('configFlowChart', {
          tooltip: commonTooltip,
          series: [
            {
              type: 'graph',
              layout: 'none',
              symbolSize: 60,
              roam: false,
              label: {
                show: true,
                position: 'bottom',
                formatter: '{b}',
                color: '#e4e6f0',
                fontSize: 11,
              },
              edgeSymbol: ['circle', 'arrow'],
              edgeSymbolSize: [6, 10],
              data: configData.nodes.map((node, index) => ({
                ...node,
                x: 150 + (index % 3) * 150,
                y: 80 + Math.floor(index / 3) * 120,
                itemStyle: {
                  color: index === 0 ? colors.blue : colors.green,
                },
              })),
              links: configData.links.map((link) => ({
                ...link,
                lineStyle: {
                  color: colors.blue,
                  width: 2,
                  curveness: 0.2,
                },
              })),
            },
          ],
        });

        // 图表 6: 组件类型分布柱状图
        const componentData = Object.entries(testData.categories).map(([name, item]) => ({
          name: name,
          value: item.tests,
        }));

        const componentTypeBarChart = createChart('componentTypeBarChart', {
          tooltip: {
            trigger: 'axis',
            axisPointer: { type: 'shadow' },
            ...commonTooltip,
          },
          grid: {
            left: '3%',
            right: '4%',
            bottom: '20%',
            top: '8%',
            containLabel: true,
          },
          xAxis: {
            type: 'category',
            data: componentData.map((d) => d.name),
            axisLabel: {
              ...commonAxisLabel,
              rotate: 30,
              interval: 0,
            },
            axisLine: { lineStyle: { color: '#2d3555' } },
          },
          yAxis: {
            type: 'value',
            name: '测试用例数',
            nameTextStyle: { color: '#8b8fa8', fontSize: 12 },
            axisLabel: commonAxisLabel,
            axisLine: { show: false },
            splitLine: { lineStyle: { color: '#2d3555', type: 'dashed' } },
          },
          series: [
            {
              type: 'bar',
              barWidth: '50%',
              itemStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                  { offset: 0, color: colors.blue },
                  { offset: 1, color: '#1d4ed8' },
                ]),
                borderRadius: [6, 6, 0, 0],
              },
              data: componentData.map((d) => d.value),
            },
          ],
        });

        // 图表 7: Store 状态流转图
        const storeData = {
          nodes: [
            { name: '初始化' },
            { name: '加载消息' },
            { name: '发送消息' },
            { name: '更新状态' },
            { name: '持久化' },
          ],
          links: [
            { source: '初始化', target: '加载消息' },
            { source: '加载消息', target: '发送消息' },
            { source: '发送消息', target: '更新状态' },
            { source: '更新状态', target: '持久化' },
          ],
        };

        const storeFlowChart = createChart('storeFlowChart', {
          tooltip: commonTooltip,
          series: [
            {
              type: 'sankey',
              layout: 'none',
              left: '10%',
              top: '10%',
              right: '10%',
              bottom: '10%',
              nodeWidth: 20,
              nodeGap: 30,
              label: {
                show: true,
                position: 'right',
                color: '#e4e6f0',
                fontSize: 12,
              },
              data: storeData.nodes.map((node) => ({
                name: node.name,
                itemStyle: { color: colors.green },
              })),
              links: storeData.links.map((link) => ({
                source: link.source,
                target: link.target,
                value: 10,
                lineStyle: {
                  color: colors.blue,
                  width: 3,
                  curveness: 0.5,
                },
              })),
            },
          ],
        });

        // 图表 8: 工具函数输入输出映射图
        const utilData = {
          nodes: [
            { name: '输入参数' },
            { name: '数据验证' },
            { name: '数据处理' },
            { name: '错误处理' },
            { name: '返回结果' },
          ],
          links: [
            { source: '输入参数', target: '数据验证', value: 100 },
            { source: '数据验证', target: '数据处理', value: 95 },
            { source: '数据验证', target: '错误处理', value: 5 },
            { source: '数据处理', target: '返回结果', value: 90 },
            { source: '错误处理', target: '返回结果', value: 5 },
          ],
        };

        const utilSankeyChart = createChart('utilSankeyChart', {
          tooltip: {
            ...commonTooltip,
            formatter: '{b}: {c}',
          },
          series: [
            {
              type: 'sankey',
              layout: 'none',
              left: '5%',
              top: '10%',
              right: '5%',
              bottom: '10%',
              nodeWidth: 30,
              nodeGap: 40,
              label: {
                show: true,
                position: 'right',
                color: '#e4e6f0',
                fontSize: 12,
              },
              data: utilData.nodes.map((node, index) => ({
                name: node.name,
                itemStyle: {
                  color: [colors.blue, colors.purple, colors.green, colors.red, colors.yellow][
                    index
                  ],
                },
              })),
              links: utilData.links,
            },
          ],
        });

        // 响应式调整
        window.addEventListener('resize', () => {
          configFlowChart.resize();
          componentTypeBarChart.resize();
          storeFlowChart.resize();
          utilSankeyChart.resize();
        });
      });
    </script>
  </body>
</html>
